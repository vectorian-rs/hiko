[project]
name = "hiko"

# First project-level policy registry.
# `hiko-cli run` / `hiko-cli check` can use this manifest to resolve named
# policies and default to the configured policy when `--config` is omitted.
[defaults]
policy = "software-developer-role"

[policies.docs-writer]
path = "policies/docs-writer.policy.toml"

[policies.software-developer-role]
path = "policies/software-developer-role.policy.toml"

[policies.harness-tools]
path = "policies/harness-tools.policy.toml"

[policies.test-runner]
path = "policies/test-runner.policy.toml"

[policies.should-fail-io]
path = "policies/should-fail-io.policy.toml"

[policies.work-demo-tight]
path = "policies/work-demo-tight.policy.toml"

[policies.work-demo-enough]
path = "policies/work-demo-enough.policy.toml"
