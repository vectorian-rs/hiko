[project]
name = "hiko"

# First project-level policy registry.
# `hiko-cli run` / `hiko-cli check` can use this manifest to resolve named
# policies and default to the configured policy when `--config` is omitted.
[defaults]
policy = "user-repo-full"

[policies.docs-writer]
path = "policies/docs-writer.policy.toml"

[policies.user-repo-full]
path = "policies/user-repo-full.policy.toml"
