[capabilities.http.http_msgpack]
enabled = true
allowed_hosts = ["127.0.0.1", "localhost"]

[capabilities.http.http_bytes]
enabled = true
allowed_hosts = ["127.0.0.1", "localhost"]

[capabilities.exec.exec]
enabled = true
allowed_commands = [
  "awk",
  "bash",
  "bun",
  "cargo",
  "cat",
  "chmod",
  "cp",
  "curl",
  "cut",
  "diff",
  "find",
  "gh",
  "git",
  "grep",
  "head",
  "jq",
  "ls",
  "make",
  "mkdir",
  "mise",
  "mv",
  "node",
  "npm",
  "open",
  "python",
  "python3",
  "rg",
  "rm",
  "sed",
  "sh",
  "sort",
  "tail",
  "tar",
  "tla",
  "touch",
  "tr",
  "uniq",
  "unzip",
  "wc",
  "xargs",
  "zip",
]
timeout = 60

[capabilities.system.exit]
enabled = true

[capabilities.testing.panic]
enabled = true

[capabilities.testing.assert]
enabled = true

[capabilities.testing.assert_eq]
enabled = true
