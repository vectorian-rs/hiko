# Documentation agent policy.
# Read the whole repo, but only write under ./docs.

[limits]
max_fuel = 20_000_000
max_heap = 250_000

[capabilities.stdio.println]
enabled = true

[capabilities.stdio.read_stdin]
enabled = true

[capabilities.convert.int_to_string]
enabled = true

[capabilities.convert.string_to_int]
enabled = true

[capabilities.string.string_length]
enabled = true

[capabilities.string.substring]
enabled = true

[capabilities.string.string_contains]
enabled = true

[capabilities.string.trim]
enabled = true

[capabilities.string.split]
enabled = true

[capabilities.string.string_replace]
enabled = true

[capabilities.string.starts_with]
enabled = true

[capabilities.string.ends_with]
enabled = true

[capabilities.string.to_upper]
enabled = true

[capabilities.string.to_lower]
enabled = true

[capabilities.string.string_join]
enabled = true

[capabilities.regex.regex_match]
enabled = true

[capabilities.regex.regex_replace]
enabled = true

[capabilities.json.json_parse]
enabled = true

[capabilities.json.json_to_string]
enabled = true

[capabilities.json.json_get]
enabled = true

[capabilities.json.json_keys]
enabled = true

[capabilities.json.json_length]
enabled = true

[capabilities.hash.blake3]
enabled = true

[capabilities.path.path_join]
enabled = true

[capabilities.filesystem.read_file]
enabled = true
folders = ["."]

[capabilities.filesystem.read_file_bytes]
enabled = true
folders = ["."]

[capabilities.filesystem.file_exists]
enabled = true
folders = ["."]

[capabilities.filesystem.list_dir]
enabled = true
folders = ["."]

[capabilities.filesystem.is_dir]
enabled = true
folders = ["."]

[capabilities.filesystem.is_file]
enabled = true
folders = ["."]

[capabilities.filesystem.read_file_tagged]
enabled = true
folders = ["."]

[capabilities.filesystem.glob]
enabled = true
folders = ["."]

[capabilities.filesystem.walk_dir]
enabled = true
folders = ["."]

[capabilities.filesystem.write_file]
enabled = true
folders = ["./docs"]

[capabilities.filesystem.create_dir]
enabled = true
folders = ["./docs"]

[capabilities.filesystem.edit_file_tagged]
enabled = true
folders = ["./docs"]
