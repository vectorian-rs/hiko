# hiko-harness configuration
# All providers must be OpenAI-compatible (/chat/completions API).

[default]
model = "gpt-4o"
provider = "openai"
max_tokens = 8192
max_turns = 50

[hiko]
# Use an installed hiko-cli by default. For local repo development you can
# point this at ./target/debug/hiko-cli after building the binary.
bin = "hiko-cli"
manifest = "hiko.toml"
policy = "harness-tools"
strict = true

# ── Providers ─────────────────────────────────────────────────────────
# All providers use the OpenAI chat completions API format.
# For Anthropic Claude, use an OpenAI-compatible proxy or gateway.

[providers.openai]
api_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
api_url = "https://api.anthropic.com/v1"
api_key_env = "ANTHROPIC_API_KEY"
api_format = "anthropic"

[providers.glm]
api_url = "https://open.bigmodel.cn/api/paas/v4"
api_key_env = "GLM_API_KEY"

[providers.kimi]
api_url = "https://api.moonshot.cn/v1"
api_key_env = "KIMI_API_KEY"

[providers.qwen]
api_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "QWEN_API_KEY"

[providers.deepseek]
api_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"

[providers.ollama]
api_url = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"

# ── Model aliases ─────────────────────────────────────────────────────

[models]
gpt-4o = { provider = "openai", id = "gpt-4o" }
gpt-4o-mini = { provider = "openai", id = "gpt-4o-mini" }
o3 = { provider = "openai", id = "o3" }
glm-4 = { provider = "glm", id = "glm-4-plus" }
kimi = { provider = "kimi", id = "moonshot-v1-auto" }
qwen-max = { provider = "qwen", id = "qwen-max" }
qwen-turbo = { provider = "qwen", id = "qwen-turbo" }
deepseek-chat = { provider = "deepseek", id = "deepseek-chat" }
deepseek-reasoner = { provider = "deepseek", id = "deepseek-reasoner" }

# Anthropic models
claude-sonnet = { provider = "anthropic", id = "claude-sonnet-4-20250514" }
claude-haiku = { provider = "anthropic", id = "claude-haiku-4-5-20251001" }

# Local models
llama3 = { provider = "ollama", id = "llama3.1:70b" }
qwen3-32b = { provider = "ollama", id = "qwen3:32b" }

# ── Roles ─────────────────────────────────────────────────────────────

[roles]
default = "gpt-4o"
fast = "gpt-4o-mini"
reasoning = "o3"
cheap = "qwen-turbo"
local = "qwen3-32b"
